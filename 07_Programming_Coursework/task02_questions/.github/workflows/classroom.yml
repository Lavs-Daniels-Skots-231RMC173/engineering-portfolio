name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: t1
      id: t1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: t1
        setup-command: ''
        command: python main.py
        input: |-
          5
          4
        expected-output: Value 1 is bigger than Value 2
        comparison-method: contains
        timeout: 1
        max-score: 1
    - name: t2
      id: t2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: t2
        setup-command: ''
        command: python main.py
        input: |-
          4
          5
        expected-output: Value 1 is smaller than Value 2
        comparison-method: contains
        timeout: 1
        max-score: 1
    - name: t3
      id: t3
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: t3
        setup-command: sudo -H pip3 install pytest
        command: pytest ./tests/test_f1.py
        timeout: 1
        max-score: 3
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        T1_RESULTS: "${{steps.t1.outputs.result}}"
        T2_RESULTS: "${{steps.t2.outputs.result}}"
        T3_RESULTS: "${{steps.t3.outputs.result}}"
      with:
        runners: t1,t2,t3
