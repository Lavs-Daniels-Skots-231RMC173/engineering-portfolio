<!DOCTYPE html>
<html>
  <!--  You don't need to edit this file! But do read the contents. -->
  <!--  information for browser  -->
  <head>
    <!--   page encoding   -->
    <meta charset="utf-8">
    <!--   instructions about page size   -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--   instructions about where style file is located   -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <!--   if you wish to try out bootstrap add the link to boostrap here   -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!--   page title that will dynamicly change based on opened page   -->
    <title>  {% block template_title %} {% endblock %} </title>
  </head>

  <!--  visible part of page  -->
  <body>
    <nav>
      <!--   navigation bar   -->
      <div class="card text-center">
        <div class="card-header">
          <ul class="nav nav-tabs card-header-tabs">
            <!--   list of links   -->
            <li class="nav-item">
              <a class="nav-link" href="/index.html">About me</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/input_page.html">Input</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/output_page.html">Output</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!--   page content that will dynamically change on opened page   -->
    {% block template_content %} {% endblock %}
  </body>
</html>
